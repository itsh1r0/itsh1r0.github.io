<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITSH1R0</title>
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg">

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Space+Mono&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Retro+Gaming&display=swap" rel="stylesheet">
</head>
<body class="home-theme" onload="initMedia()">
        
    <div id="start-screen">
        <div id="start-text"></div>
    </div>

    <div class="container">
        
        <video id="background" autoplay loop muted playsinline webkit-playsinline preload="auto">
            <source src="assets/background.mp4" type="video/mp4">
        </video>

        <div class="glitch-overlay"></div>

        <div id="profile-block">
            <div class="profile-header">
                <div class="profile-container">
                    <img src="assets/avatar.png" alt="Profile" class="profile-picture">
                </div>
                <div class="profile-info">
                    <div class="name-and-badges">
                        <div id="profile-name" data-name="ITSUKA HIRO - h1r0">ITSUKA HIRO</div>
                    </div>
                    <div id="profile-bio" data-bio='[
                    "Hi, I&#39;m gamer, and occasionally I code something.",
                    "Under footer, there are my social links.",
                    "Click to game icons to copy my in-game ID.",
                    "",
                    "¬Ersterbend."
                    ]'></div>
                </div>
            </div>

            <div class="bio-separator"></div>

            <div class="profile-footer">

                <div class="social-links">
                    <a href="https://facebook.com/hiro.itsuka.00" target="_blank">
                        <img src="assets/icon/facebook.svg" alt="Facebook" class="social-icon">
                    </a>
                    <a href="https://discord.gg/QPjyTKbWRe" target="_blank">
                        <img src="assets/icon/discord.svg" alt="Facebook" class="social-icon">
                    </a>
                    <a href="https://discord.gg/ZUgfKSvpF3" target="_blank">
                        <img src="assets/icon/discord.svg" alt="Facebook" class="social-icon">
                    </a>
                    <a href="https://github.com/itsh1r0" target="_blank">
                        <img src="assets/icon/github.svg" alt="GitHub" class="social-icon">
                    </a>
                    <a href="https://www.youtube.com/@ItsukaHiro" target="_blank">
                        <img src="assets/icon/youtube.svg" alt="YouTube" class="social-icon">
                    </a>
                    <a href="https://steamcommunity.com/id/itsukahiro" target="_blank">
                        <img src="assets/icon/steam.svg" alt="Steam" class="social-icon">
                    </a>
                    <a href="javascript:void(0);" class="copy-id-btn" data-ingame-id="4266720768">
                        <img src="assets/icon/endfield.svg" alt="Arknights: Endfield" class="social-icon">
                    </a>
                    <a href="javascript:void(0);" class="copy-id-btn" data-ingame-id="15542255">
                        <img src="assets/icon/rhodes.png" alt="Arknights" class="social-icon">
                    </a>
                    <a href="javascript:void(0);" class="copy-id-btn" data-ingame-id="10078988">
                        <img src="assets/icon/schale.svg" alt="Blue Archive ID" class="social-icon">
                    </a>
                    <a href="javascript:void(0);" class="copy-id-btn" data-ingame-id="AYUTGTSF">
                        <img src="assets/icon/schale.svg" alt="Blue Archive Friend Code" class="social-icon">
                    </a>
                </div>
            </div>
        </div>


        <div id="skills-block" class="hidden">
            <h2 class="skills-title">Programming Skills</h2>
            <div class="skill">
                <div class="skill-name">
                    <img src="assets/python.png" alt="Python" class="skill-icon">
                    <span>Python</span>
                    <span>87%</span>
                </div>
                <div class="skill-bar-container">
                    <div id="python-bar" class="skill-bar"></div>
                </div>
            </div>
            <div class="skill">
                <div class="skill-name">
                    <img src="assets/cpp.png" alt="C++" class="skill-icon">
                    <span>C++</span>
                    <span>75%</span>
                </div>
                <div class="skill-bar-container">
                    <div id="cpp-bar" class="skill-bar"></div>
                </div>
            </div>
            <div class="skill">
                <div class="skill-name">
                    <img src="assets/csharp.png" alt="C#" class="skill-icon">
                    <span>C#</span>
                    <span>80%</span>
                </div>
                <div class="skill-bar-container">
                    <div id="csharp-bar" class="skill-bar"></div>
                </div>
            </div>
        </div>


        <div id="results-button-container" class="hidden">
            <button id="results-theme">View Results</button>
            <div id="results-hint" class="hidden">Click again to return to profile</div>
        </div>


        <div class="top-controls">
            <div class="volume-control">
                <svg id="volume-icon" class="volume-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path>
                </svg>
                <input id="volume-slider" class="slider" type="range" min="0" max="1" step="0.01" value="0.1">
            </div>
            <div class="transparency-control">
                <svg class="transparency-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                </svg>
                <input id="transparency-slider" class="slider" type="range" min="0" max="1" step="0.01" value="0.7">
            </div>
        </div>
    </div>


    <audio id="background-music" loop>
        <source src="assets/music.mp3" type="audio/mp3">
    </audio>

    <div id="toast-message"></div>

    <script src="scripts/gsap.min.js"></script>
    <script src="scripts/script.js"></script>
</body>
</html>
